<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Draft Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="role-selection" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center;">
    <h1 style="color: white; margin-bottom: 30px;">Выберите вашу роль</h1>
    <div>
        <button onclick="selectRole(1)" style="padding: 20px 40px; font-size: 20px; cursor: pointer; margin: 10px; background: #4dff4d; border: none; font-weight: bold;">Я Капитан 1</button>
        <button onclick="selectRole(2)" style="padding: 20px 40px; font-size: 20px; cursor: pointer; margin: 10px; background: #ff4d4d; border: none; font-weight: bold; color: white;">Я Капитан 2</button>
    </div>
    <p style="color: #888; margin-top: 20px;">Это нужно, чтобы вы не могли случайно нажать за противника.</p>
</div>
    
    <div id="status-bar">
    <div id="current-action">Загрузка...</div>
    <div id="turn-info">Очередь Капитана 1</div>
</div>

    <div class="draft-container">
        <div id="cap1-side" class="side">
            <h3>Капитан 1</h3>
            <div id="cap1-picks" class="picks"></div>
            <div id="cap1-bans" class="bans"></div>
        </div>

        <div id="heroes-grid" class="grid">
            </div>

        <div id="cap2-side" class="side">
            <h3>Капитан 2</h3>
            <div id="cap2-picks" class="picks"></div>
            <div id="cap2-bans" class="bans"></div>
        </div>
    </div>

    <button id="reset-btn" style="margin: 10px; padding: 10px; cursor: pointer;">Сбросить драфт</button>
    <script type="module" src="script.js"></script>
    
    <div id="hero-tooltip" class="tooltip">
    <img id="tooltip-img" src="" alt="Описание">
</div>
    <button onclick="localStorage.removeItem('myRole'); location.reload();" style="margin: 10px; padding: 10px; cursor: pointer;">Сменить роль</button>
</body>
</html>
