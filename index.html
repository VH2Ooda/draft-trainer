<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Draft Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="status-bar">
        <h2 id="current-action">Загрузка...</h2>
        <p id="turn-info">Очередь Капитана 1</p>
    </div>

    <div class="draft-container">
        <div id="cap1-side" class="side">
            <h3>Капитан 1</h3>
            <div id="cap1-picks" class="picks"></div>
            <div id="cap1-bans" class="bans"></div>
        </div>

        <div id="heroes-grid" class="grid">
            </div>

        <div id="cap2-side" class="side">
            <h3>Капитан 2</h3>
            <div id="cap2-picks" class="picks"></div>
            <div id="cap2-bans" class="bans"></div>
        </div>
    </div>

    <button id="reset-btn" style="margin: 10px; padding: 10px; cursor: pointer;">Сбросить драфт</button>
    <script type="module" src="script.js"></script>
    
    <div id="hero-tooltip" class="tooltip">
    <img id="tooltip-img" src="" alt="Описание">
</div>
<div id="status-bar">
    <h2 id="current-action">Загрузка...</h2>
    <p id="turn-info">Очередь Капитана 1</p>
    <p id="next-turn-info" style="opacity: 0.7; font-size: 0.9em;"></p>
</div>
</body>
</html>
