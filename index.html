<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Draft Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="role-selection">
        <h1>Выберите вашу роль</h1>
        <div class="role-buttons">
            <button onclick="selectRole(1)" class="btn-cap1">Я Капитан 1</button>
            <button onclick="selectRole(2)" class="btn-cap2">Я Капитан 2</button>
        </div>
    </div>
    
    <div id="status-bar">
        <div id="current-action">Загрузка...</div>
        <div id="turn-info">Очередь Капитана 1</div>
    </div>

    <div class="draft-container">
        <div id="cap1-side" class="side">
            <h3>Капитан 1</h3>
            <div id="cap1-picks" class="picks"></div>
            <div id="cap1-bans" class="bans"></div>
        </div>

        <div id="heroes-grid" class="grid"></div>

        <div id="cap2-side" class="side">
            <h3>Капитан 2</h3>
            <div id="cap2-picks" class="picks"></div>
            <div id="cap2-bans" class="bans"></div>
        </div>
    </div>

    <div class="controls-container">
        <button id="reset-btn">Сбросить драфт</button>
        <button id="change-role-btn" onclick="localStorage.removeItem('myRole'); location.reload();">Сменить роль</button>
    </div>

    <script type="module" src="script.js"></script>
    
    <div id="hero-tooltip" class="tooltip">
        <img id="tooltip-img" src="" alt="Описание">
    </div>
</body>
</html>
